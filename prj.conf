CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_GPIO=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="dino:~$ "
CONFIG_DEVICE_SHELL=y
CONFIG_I2C_SHELL=y

CONFIG_GPIO_SHELL=y

# Display: ST7796S via MIPI DBI SPI
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_ST7796S=y
CONFIG_DISPLAY=y

# Capacitive touch: FT5336/FT6x36 confirmed at 0x38 on I2C1
# Polling mode avoids EXTI13 conflict (user button PC13 vs CTP_INT PF13, same line)
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_FT5336_INTERRUPT=n

CONFIG_HEAP_MEM_POOL_SIZE=8192

# PWM for backlight
CONFIG_PWM=y
