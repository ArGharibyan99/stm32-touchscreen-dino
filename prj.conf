CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_GPIO=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="dino:~$ "
CONFIG_DEVICE_SHELL=y
CONFIG_I2C_SHELL=y

CONFIG_GPIO_SHELL=y

# Display: ST7796S via MIPI DBI SPI
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_ST7796S=y
CONFIG_DISPLAY=y
CONFIG_SDHC=y
CONFIG_SD_LOG_LEVEL_OFF=y
CONFIG_SDHC_LOG_LEVEL_OFF=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_LOG_LEVEL_OFF=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_MAX_LFN=64
CONFIG_DISK_DRIVER_SDMMC=y

# Capacitive touch: FT5336/FT6x36 confirmed at 0x38 on I2C1
# Polling mode avoids EXTI13 conflict (user button PC13 vs CTP_INT PF13, same line)
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_FT5336_INTERRUPT=n

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=16384

# PWM for backlight
CONFIG_PWM=y
